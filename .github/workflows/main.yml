name: CI

on: [push]

jobs:
  sast_scan:
    name: Run Bandit Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: 3.8
      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit Scan
        run: bandit -ll -li -r . -f json -o bandit-report.json

      - name: Upload Artifact
        uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: bandit-findings
          path: bandit-report.json
          
  image_scan:
    name: Build Image and Run Image Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Set Up Docker
        uses: docker/setup-docker-action@v5.1.0
        with:
          version: '20.10.7'

      - name: Build Docker Image
        run: docker build -f Dockerfile -t myapp:latest .

      - name: Docker login
        run: echo ${{ secrets.REPO_PWD }} | docker login -u ${{ secrets.REPO_USER }} --password-stdin

      - name: Docker Scout Scan
        uses: docker/scout-action@v1.20.4
        with:
          comand: quickview,cves
          image: myapp:latest
          
  
